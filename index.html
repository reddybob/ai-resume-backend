<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>AI Resume Analyzer</h1>
    <p>Smart Resume Screening System</p>
    <button onclick="toggleMode()" class="toggle-btn">Toggle Mode</button>
</header>

<!-- Main Layout -->
<div class="main-container">

    <!-- LEFT: Upload Section -->
    <div class="left">
        <div class="upload-box">
            <h2>Upload Resume</h2>

            <label class="file-label">
                📄 Choose Resume
                <input type="file" id="resume" hidden>
            </label>

            <p id="file-name">No file chosen</p>

            <select id="job" class="dropdown">
                <option value="">Select Role</option>
                <option value="python">Python Developer</option>
                <option value="data">Data Scientist</option>
                <option value="web">Web Developer</option>
                <option value="ai">AI Engineer</option>
                <option value="ml">Machine Learning Engineer</option>
                <option value="cloud">Cloud Engineer</option>
                <option value="cyber">Cyber Security</option>
            </select>

            <button onclick="uploadResume()">Analyze Resume</button>
        </div>
    </div>

    <!-- RIGHT: Resume Preview -->
    <div class="right">
        <h2>Resume Preview</h2>
        <iframe id="preview"></iframe>
    </div>

</div>

<!-- RESULT BELOW -->
<div id="result">
    <h2>📊 Result</h2>

    <div class="progress">
        <div id="bar"></div>
    </div>

    <p id="match"></p>
</div>

<script src="script.js"></script>

</body>
</html>
